<!DOCTYPE html>
<html lang="en">
  <head>
    <title></title>
    <meta charset = "utf-8">
    <meta name = "viewport" content = "width=device-width" initial-scale="1">
    <link rel="stylesheet" type="text/css" href="index2.css">
	<script src="http://code.jquery.com/jquery-1.11.0.min.js"></script>
  <head>
  <body>
    <nav>
      <ul>
        <li><a id="about" onclick="load_about()"><img class="fade" src="icons/about.png" title="About"/></a></li>
        <li><a id="art" onclick="load_art()"><img class="fade" src="icons/art.png" title="Art"/></a></li>
        <li><a id="logo" href="index.html"><img class="fade" src="icons/logoicon.png"/></a></li>
        <li><a id="linkedin" href="https://www.linkedin.com/in/naomibasu?trk=nav_responsive_tab_profile_pic"><img class="fade" src="icons/linkedin.png"/></a></li>
        <li><a id="project" onclick="load_projects()"><img class="fade" src="icons/project.png" title="Projects"/></a></li>
      </ul>
    </nav>

    <div id="content">
	    <script>
			  $(function() {
			  	// Set up side icons
		      $("#about").hide().fadeIn(500);
		      $("#art").hide().delay(200).fadeIn(500);
		      $("#logo").hide().delay(400).fadeIn(500);
		      $("#linkedin").hide().delay(600).fadeIn(500);
		      $("#project").hide().delay(800).fadeIn(500);
		      $(".block").hide().delay(850).fadeIn(600)
		      //$("footer").hide().delay(1200).fadeIn(500);	     		    
			  });	

			  // Page title
			  var pageTitle = document.head.getElementsByTagName('title');

	 			// Create image links
	 			var art_names = ['photos/glass.jpg', 'photos/pops.jpg', 'photos/selfportrait.jpg', 'photos/pops_dinner.jpg', 'photos/whit.jpg', 'photos/ma.jpeg', 'photos/smoke.jpg', 'photos/moike.jpg'];

	 			// Create project image links
	 			var project_names = ['load_earth()', 'load_forcefield()', 'load_underdog()', 'load_sketchar()'];
	 			var project_dict = {
	 				'load_earth()': 'epgifs/earthWiki.gif',
	 				'load_forcefield()': 'epgifs/fade.gif',
	 				'load_underdog()': 'photos/underdog1.jpg',
	 				'load_sketchar()': 'photos/sketchAR.gif'
	 			};

		    $(window).resize(setupBlocks); 

		  	// Set up block columns
		    var colCount = 0;
		    var colWidth = 0;
		    var margin = 30;
		    var windowWidth = 0;
		    var blocks = [];  

		    function setupBlocks() {
		      windowWidth = $(window).width();
		      colWidth = $('.block').outerWidth();
		      // colWidth = Math.floor(windowWidth/3);
		      blocks = [];
		      colCount = Math.floor(windowWidth/(colWidth+margin*3));
		      for(var i = 0; i < colCount; i++) {
		        blocks.push(margin);
		      }
		      positionBlocks();
		    }

		    function positionBlocks() {
		      $('.block').each(function(){
		        var min = Array.min(blocks);
		        var index = $.inArray(min, blocks);
		        var leftPos = margin+(index*(colWidth+margin));
		        $(this).css({
		          'left':leftPos+'px',
		          'top':min+'px'
		        });
		        // blocks[index] = min+$(this).outerHeight()+margin;
		        blocks[index] = min+$(this).outerHeight(true)+margin;
		      }); 
		    }

		    Array.min = function(array) {
	        return Math.min.apply(Math, array);
		    };

		    // Remove all content within an element
				function clearElement(id) {
					document.getElementById(id).innerHTML = "";
				}

		    function load_projects() {
		    	clearElement('content');
			 		//Set title of page
			 		// var title = document.getElementById('content').appendChild(document.createElement('h2'));
		 			var titleDiv = document.getElementById('content').appendChild(document.createElement('div'));
		 			titleDiv.setAttribute('class', 'titleDiv');
		 			var title = titleDiv.appendChild(document.createElement('h2'));
		 			title.innerHTML = 'P R O J E C T S';
		 			pageTitle[0].innerHTML = 'projects';

		 			for (const element of project_names) {
			 			// var project = document.body.appendChild(document.createElement('figure'));
			 			var project = document.getElementById('content').appendChild(document.createElement('figure'));
			 			project.setAttribute('onclick', element);
			 			var image = project.appendChild(document.createElement('img'));
			 			image.setAttribute('class', 'block fade');
			 			image.setAttribute('src', project_dict[element]);
		 			}
		 			// Loading animation
		 			setTimeout(setupBlocks, 200);
				}	

		    function load_art() {
		    	clearElement('content');
		    	pageTitle[0].innerHTML = 'A R T';

		 			for (const element of art_names) {
		 				// var link = document.body.appendChild(document.createElement('a'));
		 				var link = document.getElementById('content').appendChild(document.createElement('a'));
		 				link.setAttribute('href', element);
			 			var figure = link.appendChild(document.createElement('figure'));
			 			var image = figure.appendChild(document.createElement('img'));
			 			image.setAttribute('class', 'block fade');
			 			image.setAttribute('src', element);
		 			}
		 			// Loading animation
		 			setTimeout(setupBlocks, 200);
				}	

				// TODO
		    function load_about() {
		    	clearElement('content');

			 		//Set title of page
		 			var titleDiv = document.getElementById('content').appendChild(document.createElement('div'));
		 			titleDiv.setAttribute('class', 'titleDiv');
		 			var title = titleDiv.appendChild(document.createElement('h2'));
		 			title.innerHTML = 'A B O U T';
				}		

				// TODO
		    function load_earth() {
		    	clearElement('content');
		    	pageTitle[0].innerHTML = 'earthvr';
				}	

				// TODO
		    function load_forcefield() {
		    	clearElement('content');
		    	pageTitle[0].innerHTML = 'forcefield';
				}		

				// TODO
		    function load_underdog() {
		    	clearElement('content');
		    	pageTitle[0].innerHTML = 'underdog';
				}	

				// TODO
		    function load_sketchar() {
		    	clearElement('content'); 	
		    	pageTitle[0].innerHTML = 'sketchar';
				}				  
	    </script>    	
    </div>

  </body> 
</html>

    <script>
		  $(function() {
		  	// Set up side icons
	      $("#about").hide().fadeIn(500);
	      $("#art").hide().delay(200).fadeIn(500);
	      $("#logo").hide().delay(400).fadeIn(500);
	      $("#linkedin").hide().delay(600).fadeIn(500);
	      $("#project").hide().delay(800).fadeIn(500);
	      $(".block").hide().delay(850).fadeIn(600)
	      //$("footer").hide().delay(1200).fadeIn(500);	     		    
		  });	

 			// Create image links
 			var art_names = ['photos/glass.jpg', 'photos/pops.jpg', 'photos/selfportrait.jpg', 'photos/pops_dinner.jpg', 'photos/whit.jpg', 'photos/ma.jpeg', 'photos/smoke.jpg', 'photos/moike.jpg'];

 			// Create project image links
 			var project_names = ['load_earth()', 'load_forcefield()', 'load_underdog()', 'load_sketchar()'];
 			var project_dict = {
 				'load_earth()': 'epgifs/earthWiki.gif',
 				'load_forcefield()': 'epgifs/fade.gif',
 				'load_underdog()': 'photos/underdog1.jpg',
 				'load_sketchar()': 'photos/sketchAR.gif'
 			};

	    $(window).resize(setupBlocks); 

	  	// Set up block columns
	    var colCount = 0;
	    var colWidth = 0;
	    var margin = 30;
	    var windowWidth = 0;
	    var blocks = [];  

	    function setupBlocks() {
	      windowWidth = $(window).width();
	      colWidth = $('.block').outerWidth();
	      // colWidth = Math.floor(windowWidth/3);
	      blocks = [];
	      colCount = Math.floor(windowWidth/(colWidth+margin*3));
	      for(var i = 0; i < colCount; i++) {
	        blocks.push(margin);
	      }
	      positionBlocks();
	    }

	    function positionBlocks() {
	      $('.block').each(function(){
	        var min = Array.min(blocks);
	        var index = $.inArray(min, blocks);
	        var leftPos = margin+(index*(colWidth+margin));
	        $(this).css({
	          'left':leftPos+'px',
	          'top':min+'px'
	        });
	        // blocks[index] = min+$(this).outerHeight()+margin;
	        blocks[index] = min+$(this).outerHeight(true)+margin;
	      }); 
	    }

	    Array.min = function(array) {
        return Math.min.apply(Math, array);
	    };

			function removeElements(className) {
		    var elements = document.getElementsByClassName(className);
				while(elements[0]) {
				    elements[0].parentNode.removeChild(elements[0]);
				}
			}

	    function load_projects() {
	    	removeElements('content');
		 		// Set title of page
	 			// var title = document.body.appendChild(document.createElement('h1'));
	 			// title.setAttribute('class', 'content');
	 			// title.innerHTML = 'P R O J E C T S';

	 			for (const element of project_names) {
		 			var project = document.body.appendChild(document.createElement('figure'));
		 			project.setAttribute('onclick', element);
		 			project.setAttribute('class', 'content');
		 			var image = project.appendChild(document.createElement('img'));
		 			image.setAttribute('class', 'block fade');
		 			image.setAttribute('src', project_dict[element]);
	 			}
	 			setTimeout(setupBlocks, 1000);
			}	

	    function load_art() {
	    	removeElements('content');

	 			for (const element of art_names) {
	 				var link = document.body.appendChild(document.createElement('a'));
	 				link.setAttribute('href', element);
	 				link.setAttribute('class', 'content');
		 			var figure = link.appendChild(document.createElement('figure'));
		 			figure.setAttribute('class', 'content');
		 			var image = figure.appendChild(document.createElement('img'));
		 			image.setAttribute('class', 'block fade');
		 			image.setAttribute('src', element);
	 			}
	 			setTimeout(setupBlocks, 1000);
			}

    </script>
